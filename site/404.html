<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Morphkit</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0A0C;
      color: #F4F4F5;
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    .container {
      text-align: center;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }
    .code {
      font-size: clamp(72px, 15vw, 128px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #3ECF8E, #F0B429);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #A0A0AB;
      font-size: 16px;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #3ECF8E;
      color: #0A0A0C;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.2s;
    }
    a:hover { background: #5DDBA3; transform: translateY(-1px); }
    a:focus-visible { outline: 2px solid #5DDBA3; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code" aria-hidden="true">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Morphkit</a>
  </div>
</body>
</html>
