name: Security

# Thin caller — logic lives in the org-wide reusable workflow.
# Source of truth: https://github.com/ashlrai/.github/blob/main/.github/workflows/reusable-security.yml
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  security:
    permissions:
      contents: read
      security-events: write
    uses: ashlrai/.github/.github/workflows/reusable-security.yml@main
    with:
      public: true
